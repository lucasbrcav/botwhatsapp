version: '3.9'

networks:
  botnet:
    driver: bridge
  proxy:
    external: true

volumes:
  sqlite_data:
  waha_data:
  redis_data:

services:
  # ------------------------------------------------------------------ #
  # WAHA — gateway WhatsApp (só acessível internamente pela botnet)      #
  # Para escanear o QR durante o setup use: docker compose port waha 3000#
  # ------------------------------------------------------------------ #
  waha:
    image: devlikeapro/waha:noweb
    platform: linux/amd64   # WAHA não tem imagem ARM64 — QEMU emula AMD64
    container_name: waha
    restart: unless-stopped
    # Porta exposta somente para acesso local temporário durante setup.
    # Remova esta linha após o QR ser escaneado em produção.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: http://backend:3001/api/webhooks/waha
      WHATSAPP_HOOK_EVENTS: message,session.status
    volumes:
      - waha_data:/app/.waha
    networks:
      - botnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Api-Key: $$WHATSAPP_API_KEY\" http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    # Sem porta exposta — tráfego chega pelo nginx
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      WAHA_URL: ${WAHA_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS_HASH: ${ADMIN_PASS_HASH}
      DATABASE_URL: file:/data/bot.db
      REDIS_URL: redis://redis:6379
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost}
      BACKEND_INTERNAL_URL: http://backend:3001
    volumes:
      - sqlite_data:/data
    networks:
      - botnet
      - proxy
    depends_on:
      redis:
        condition: service_healthy
      waha:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  admin:
    build:
      context: ../apps/admin
      dockerfile: Dockerfile
    container_name: admin
    restart: unless-stopped
    # Sem porta exposta — tráfego chega pelo nginx
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: "0.0.0.0"
      # URL usada pelo browser (passa pelo nginx)
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}
      # URL usada pelo SSR do Next.js (direto ao backend via rede interna)
      INTERNAL_API_URL: http://backend:3001
    networks:
      - botnet
      - proxy
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
